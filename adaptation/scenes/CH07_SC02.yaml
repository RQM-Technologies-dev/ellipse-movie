continuity_notes: Aaron's suspicion about Aura's silver and influence should simmer through the market sequence. This scene should link directly into the flower shop, textbook boy, West Eros Stables, Peridot, and the ride to the Academy.
adaptation_notes: Do not play this as a compressed montage. Treat it as a continuous stitched sequence of chained events, with Eros world-building as a major audience reward. See `adaptation/sequences/CH07_eros_market_sequence.yaml` and `docs/visual_direction.md`.
