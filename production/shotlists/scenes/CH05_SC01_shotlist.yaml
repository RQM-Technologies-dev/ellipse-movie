  type: port reveal
  framing: Tara harbor, rocks, boats, and the Elgia's three masts
  camera: wide arrival with Aaron scanning for opportunity
  action: Aaron identifies the Elgia.
  purpose: Establish the departure vehicle.
- shot_id: CH05_SC01_SH002
  type: opportunity
  framing: Matis loading cargo with pulley system
  camera: Aaron's look to Matis and the open ship access
  action: Aaron decides to approach.
  purpose: Create a practical path aboard.
- shot_id: CH05_SC01_SH003
  type: refusal
  framing: Aaron and Matis near the gangway/cargo area
  camera: grounded dialogue coverage
  action: Matis says the Elgia does not take passengers.
