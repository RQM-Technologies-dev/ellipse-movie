location_id: LOC_FOREST_COTTAGE
name: Aura-Created Forest Cottage
description: Home created by Aura from Aaron's imagination after he tests her powers.
geography: Woods below the Academy road, with stream and forest trail.
architecture: Two-story cottage composed of petrified wood and amethyst, built around a fresh spring/stream with center fire and protective structure.
lighting: Night, suspended fire, creation flashes, dust-lit glow.
mood: Miracle, proof, intimacy, home.
recurring_props:
- suspended fire
- thousand-faceted gem
- babbling brook
- amethyst walls
color_palette: amethyst, petrified wood, fire gold, blue/silver dust
visual_reference_notes: This is the Act I love/home image; it should be beautiful but newly born.
continuity_notes: The cottage creation visually echoes the rain of lights.
